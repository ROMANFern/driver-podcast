# Global pipeline settings
podcast:
  title: "Manusha's Daily Drive"
  author: "Daily Drive Bot"
  description: "A personalized daily briefing on AI, anime, and your favorite creators."
  language: "en"
  # Random slug keeps the feed URL private-ish. Change it to rotate the URL.
  feed_slug: "dd-7k3x9q2m"
  # Set after creating the GitHub repo and enabling Pages, e.g.
  # https://<username>.github.io/driver-podcast
  base_url: "https://romanfern.github.io/driver-podcast"

episode:
  target_words: 2600        # ~15-20 minutes of speech
  keep_last: 14             # episodes retained in the feed

# LLM providers, tried in order. A provider is skipped if its API key env var
# is unset. owl-alpha is a free stealth-preview model (prompts may be logged,
# may disappear without notice); Gemini Flash free tier is the safety net.
llm:
  providers:
    - name: "openrouter"
      base_url: "https://openrouter.ai/api/v1"
      model: "openrouter/owl-alpha"
      api_key_env: "OPENROUTER_API_KEY"
    - name: "gemini"
      base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
      model: "gemini-flash-latest"
      api_key_env: "GEMINI_API_KEY"

script:
  host_name: "Aria"
  listener_name: "Manusha"

research:
  items_per_topic: 6

# Audio engine: "notebooklm" = two-host AI podcast via NotebookLM Audio
# Overviews (needs NOTEBOOKLM_AUTH_JSON; unofficial client). "edge" = single
# voice via Edge TTS. With "notebooklm", the pipeline automatically falls back
# to the edge path if generation fails (e.g. expired Google session).
audio:
  engine: "notebooklm"

notebooklm:
  audio_format: "DEEP_DIVE"     # BRIEF | DEEP_DIVE | CRITIQUE | DEBATE
  audio_length: "LONG"          # SHORT | DEFAULT | LONG
  timeout_seconds: 1500
  instructions: >
    This is a daily morning-drive briefing made for one listener, Manusha.
    Address him directly now and then. Cover the AI news, then anime news,
    then the new videos from his YouTube creators (name each channel).
    Keep it energetic and conversational, around fifteen to twenty minutes.

# Edge TTS fallback voice. List voices: python -m edge_tts --list-voices
tts:
  voice: "en-US-AvaMultilingualNeural"
  rate: "+0%"

youtube:
  lookback_hours: 26        # slight overlap so nothing is missed between runs
  max_videos_per_day: 6
  max_transcript_chars: 12000
